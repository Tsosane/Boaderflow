apiVersion: v1
kind: ConfigMap
metadata:
  name: site-config
  namespace: borderflow-site
data:
  SITE_CODE: "DEPOT-MSU"
  SITE_NAME: "Maseru Depot"
  DATABASE_URL: "postgresql+psycopg://borderflow:borderflow@postgres:5432/borderflow"
  REDIS_URL: "redis://redis:6379/0"
  REPL_PUBLICATIONS: "pub_depot_master"
  REPL_SUBSCRIPTIONS: ""
  REPLICATION_USER: "repl_user"
  REPLICATION_PASSWORD: "repl_pass"
  TOPOLOGY_PATH: "/app/infra/replication_topology.json"
  BOOTSTRAP_DATABASE: "false"
  SEED_SCOPE: "depot_only"
  SEED_PASSWORD: "borderflow123"
---
apiVersion: v1
kind: Secret
metadata:
  name: site-secrets
  namespace: borderflow-site
type: Opaque
stringData:
  API_SECRET_KEY: "change-me"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: borderflow-site
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          args:
            - "-c"
            - "wal_level=logical"
            - "-c"
            - "max_replication_slots=64"
            - "-c"
            - "max_wal_senders=64"
            - "-c"
            - "max_logical_replication_workers=64"
            - "-c"
            - "max_worker_processes=80"
          env:
            - name: POSTGRES_DB
              value: borderflow
            - name: POSTGRES_USER
              value: borderflow
            - name: POSTGRES_PASSWORD
              value: borderflow
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: borderflow-site
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: site-bootstrap
  namespace: borderflow-site
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: borderflow-api:latest
          command: ["python", "-m", "app.cli", "init-site"]
          envFrom:
            - configMapRef:
                name: site-config
            - secretRef:
                name: site-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: borderflow-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: borderflow-api:latest
          envFrom:
            - configMapRef:
                name: site-config
            - secretRef:
                name: site-secrets
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: borderflow-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery-worker
          image: borderflow-worker:latest
          envFrom:
            - configMapRef:
                name: site-config
            - secretRef:
                name: site-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: borderflow-site
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
