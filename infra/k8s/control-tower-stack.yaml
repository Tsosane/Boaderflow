apiVersion: v1
kind: ConfigMap
metadata:
  name: control-tower-config
  namespace: borderflow-site
data:
  SITE_CODE: "CTRL-TOWER"
  SITE_NAME: "Control Tower"
  DATABASE_URL: "postgresql+psycopg://borderflow:borderflow@postgres:5432/borderflow"
  REDIS_URL: "redis://redis:6379/0"
  REPL_PUBLICATIONS: ""
  REPL_SUBSCRIPTIONS: "sub_tower_from_depot,sub_tower_from_border,sub_tower_from_port,sub_tower_from_hub"
  REPLICATION_USER: "repl_user"
  REPLICATION_PASSWORD: "repl_pass"
  TOPOLOGY_PATH: "/app/infra/replication_topology.json"
  BOOTSTRAP_DATABASE: "false"
  SEED_SCOPE: "none"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: control-tower-bootstrap
  namespace: borderflow-site
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: borderflow-api:latest
          command: ["python", "-m", "app.cli", "init-site"]
          envFrom:
            - configMapRef:
                name: control-tower-config
            - secretRef:
                name: site-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-tower-api
  namespace: borderflow-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-tower-api
  template:
    metadata:
      labels:
        app: control-tower-api
    spec:
      containers:
        - name: api
          image: borderflow-api:latest
          envFrom:
            - configMapRef:
                name: control-tower-config
            - secretRef:
                name: site-secrets
          ports:
            - containerPort: 8000
